<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SAME - Sistema</title>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>
/* ===== GERAL ===== */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

button {
  padding: 12px;
  background: #22c55e;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.3s;
}
button:hover { background: #16a34a; }

/* ===== LOGIN ===== */
.login-box {
  background: #1e293b;
  padding: 30px;
  border-radius: 12px;
  width: 360px;
  margin: 120px auto;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.login-box input, .login-box select {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* ===== PAINEL ===== */
#painel { display: none; height: 100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px;
  background: #020617;
  height: 100vh;
  padding: 20px;
  position: fixed;
  box-shadow: 3px 0 20px rgba(0,0,0,0.6);
}
.sidebar h2 { margin-bottom: 30px; }
.sidebar button {
  width: 100%;
  margin-bottom: 12px;
  background: #1e293b;
  text-align: left;
  padding-left: 15px;
}
.sidebar button:hover { background: #111827; }

/* ===== CONTEÚDO ===== */
.content {
  margin-left: 260px;
  padding: 30px;
}
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

/* ===== CARDS ===== */
.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 15px;
  margin-bottom: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  transition: 0.3s;
}
.card:hover { transform: translateY(-3px); }

/* ===== LISTAS ===== */
li {
  background: #020617;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  transition: 0.2s;
}
li:hover { background: #111827; cursor: pointer; }

/* ===== CALENDÁRIO ===== */
#calendar {
  background: white;
  color: black;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
}
.fc { border-radius: 12px; }

/* ===== POPUP DETALHES ===== */
#detalhesDia {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  max-width: 450px;
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  display: none;
  z-index: 1000;
  transition: all 0.3s ease;
}
#detalhesDia h3 { margin-top: 0; }
#detalhesDia div { margin-bottom: 8px; border-bottom: 1px solid #0f172a; padding-bottom: 5px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-box">
  <h2>Login SAME</h2>
  <form onsubmit="login(); return false;">
    <input type="text" id="loginUser" placeholder="Usuário" required>
    <input type="password" id="loginPass" placeholder="Senha" required>
    <button type="submit">Entrar</button>
  </form>
  <p id="loginErro" style="color:red;"></p>
</div>

<!-- PAINEL -->
<div id="painel">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>SAME</h2>
    <button onclick="mostrarTela('dashboard')">🏠 Dashboard</button>
    <button onclick="mostrarTela('solicitacoes')">📋 Solicitações</button>
    <button onclick="mostrarTela('usuarios')">👥 Usuários</button>
    <button onclick="logout()">🚪 Sair</button>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <div class="topbar">
      <h1 id="titulo">Dashboard</h1>
      <span id="infoUsuario"></span>
<button onclick="abrirTrocaSenha()">🔒 Trocar Senha</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="tela">
      <div class="card" id="aniversariantes">
        <h2>🎂 Aniversariantes do mês</h2>
        <ul id="listaAniversariantes"></ul>
      </div>
      <div class="card">
        <h2>📅 Calendário</h2>
        <div id="calendar"></div>
      </div>
    </div>

    <!-- SOLICITAÇÕES -->
    <div id="solicitacoes" class="tela" style="display:none;">
      <div class="card">
        <h2>Nova Solicitação</h2>
        <select id="tipo">
          <option value="falta">Falta</option>
          <option value="atraso">Atraso</option>
          <option value="ferias">Férias</option>
        </select>
        <input type="date" id="data">
        <textarea id="motivo" placeholder="Motivo"></textarea>
        <button onclick="criarSolicitacao()">Enviar</button>
      </div>
      <div class="card">
        <h2>Solicitações</h2>
        <ul id="listaSolicitacoes"></ul>
      </div>
    </div>

    <!-- USUÁRIOS -->
    <div id="usuarios" class="tela" style="display:none;">
      <div class="card">
        <h2>Criar Usuário</h2>
        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="senha" placeholder="Senha">
        <select id="role">
          <option value="user">Usuário</option>
          <option value="admin">Admin</option>
        </select>
        <button onclick="criarUsuario()">Criar</button>
      </div>
      <div class="card">
        <h2>Lista de Usuários</h2>
        <ul id="listaUsuarios"></ul>
      </div>
    </div>

  </div>
</div>
<div id="popupSenha" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
background:#1e293b; padding:20px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.6); z-index:2000;">

  <h3>Trocar Senha</h3>

  <input type="password" id="novaSenha" placeholder="Nova senha" style="width:100%; margin:10px 0; padding:10px;">
  
  <button onclick="trocarSenha()">Salvar</button>
  <button onclick="fecharTrocaSenha()" style="background:red;">Cancelar</button>
</div>
<div id="detalhesDia"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="script.js"></script>

</body>
</html>
