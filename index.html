<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>SAME - Sistema</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    .login-box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      margin: 100px auto;
      text-align: center;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #painel {
      display: none;
      padding: 20px;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-box">
  <h2>Login SAME</h2>
  <input type="text" id="loginUser" placeholder="Usuário">
  <input type="password" id="loginPass" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <p id="loginErro" style="color:red;"></p>
</div>

<!-- PAINEL -->
<div id="painel">

  <div class="box">
    <h2>Nova Solicitação</h2>

    <select id="tipo">
      <option value="falta">Falta</option>
      <option value="atraso">Atraso</option>
      <option value="ferias">Férias</option>
    </select>

    <input type="date" id="data">
    <textarea id="motivo" placeholder="Motivo"></textarea>

    <button onclick="criarSolicitacao()">Enviar</button>
  </div>

  <div class="box">
    <h2>Solicitações</h2>
    <ul id="listaSolicitacoes"></ul>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
