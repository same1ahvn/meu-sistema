<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>SAME - Sistema</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #painel {
      display: none;
      text-align: center;
    }
  </style>
</head>

<body>

<div id="loginScreen" class="login-box">
  <h2>Login SAME</h2>
  <input type="text" id="loginUser" placeholder="Usuário">
  <input type="password" id="loginPass" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <p id="loginErro" style="color:red;"></p>
</div>

<div id="painel">
  <h1>Bem-vindo ao sistema</h1>
  <p id="infoUsuario"></p>
</div>

<script src="script.js"></script>

</body>
</html>
