<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SAME - Sistema</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
}

/* LOGIN */
.login-box {
  background: #1e293b;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  margin: 120px auto;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}

/* BOTÃO */
button {
  padding: 12px;
  background: #22c55e;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.2s;
}

button:hover {
  background: #16a34a;
}

/* PAINEL */
#painel {
  display: none;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #020617;
  height: 100vh;
  padding: 20px;
  position: fixed;
  box-shadow: 2px 0 10px rgba(0,0,0,0.5);
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar button {
  width: 100%;
  margin-bottom: 12px;
  background: #1e293b;
  text-align: left;
}

/* CONTEÚDO */
.content {
  margin-left: 260px;
  padding: 30px;
}

/* TOPO */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

/* CARDS */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* LISTA */
li {
  background: #020617;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  transition: 0.2s;
}

li:hover {
  background: #0f172a;
}

/* CALENDÁRIO */
#calendar {
  background: white;
  color: black;
  padding: 10px;
  border-radius: 10px;
}

.fc {
  border-radius: 10px;
}

/* DETALHES DO DIA */
#detalhesDia {
  display: none;
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
  max-height: 300px;
  overflow-y: auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-box">
  <h2>Login SAME</h2>
  <input type="text" id="loginUser" placeholder="Usuário">
  <input type="password" id="loginPass" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <p id="loginErro" style="color:red;"></p>
</div>

<!-- PAINEL -->
<div id="painel">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>SAME</h2>
    <button onclick="mostrarTela('dashboard')">🏠 Dashboard</button>
    <button onclick="mostrarTela('solicitacoes')">📋 Solicitações</button>
    <button onclick="logout()">🚪 Sair</button>
  </div>

  <!-- CONTEÚDO -->
  <div class="content">

    <div class="topbar">
      <h1 id="titulo">Dashboard</h1>
      <span id="infoUsuario"></span>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="tela">

      <!-- ANIVERSARIANTES -->
      <div class="card" id="aniversariantes">
        <h2>🎂 Aniversariantes do mês</h2>
        <ul id="listaAniversariantes"></ul>
      </div>

      <!-- CALENDÁRIO -->
      <div class="card">
        <h2>📅 Calendário</h2>
        <div id="calendar"></div>
        <div id="detalhesDia"></div>
      </div>

    </div>

    <!-- SOLICITAÇÕES -->
    <div id="solicitacoes" class="tela" style="display:none;">

      <div class="card">
        <h2>Nova Solicitação</h2>

        <select id="tipo">
          <option value="falta">Falta</option>
          <option value="atraso">Atraso</option>
          <option value="ferias">Férias</option>
        </select>

        <input type="date" id="data">
        <textarea id="motivo" placeholder="Motivo"></textarea>

        <button onclick="criarSolicitacao()">Enviar</button>
      </div>

      <div class="card">
        <h2>Solicitações</h2>
        <ul id="listaSolicitacoes"></ul>
      </div>

    </div>

  </div>

</div>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="script.js"></script>

</body>
</html>
